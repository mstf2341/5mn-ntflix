<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Entertainment Challenge 🎬</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000000; color: white; text-align: center; margin: 0; padding: 10px; }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 95vh; }
        .active { display: flex; }
        input { padding: 15px; border-radius: 12px; border: 2px solid #e50914; margin: 10px; width: 85%; background: #141414; color: white; font-size: 18px; text-align: center; }
        button { padding: 15px; border-radius: 30px; border: none; background: #e50914; color: white; font-size: 18px; cursor: pointer; margin: 6px; width: 90%; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        .card { font-size: 26px; font-weight: bold; background: white; color: #141414; padding: 50px 15px; border-radius: 20px; margin: 15px 0; width: 85%; box-shadow: 0 0 25px rgba(229, 9, 20, 0.4); min-height: 120px; display: flex; align-items: center; justify-content: center; border-bottom: 10px solid #e50914; }
        .timer-display { font-size: 45px; font-weight: bold; color: #f5f5f1; margin: 10px 0; background: rgba(229, 9, 20, 0.2); padding: 5px 30px; border-radius: 50px; border: 2px solid #e50914; }
        .score-board { display: flex; justify-content: space-around; width: 100%; margin-top: 15px; }
        .team-box { background: #141414; padding: 10px; border-radius: 15px; border: 1px solid #e50914; width: 46%; }
        .score-val { font-size: 35px; color: #e50914; font-weight: bold; display: block; }
        .btn-small { width: 45px; height: 45px; border-radius: 50%; font-size: 22px; margin: 5px; display: inline-block; cursor: pointer; border: none; color: white; }
    </style>
</head>
<body>

    <div id="setup" class="screen active">
        <h1 style="color:#e50914">SARZIX Challenge 🍿</h1>
        <input type="text" id="t1" placeholder="Team 1 Name">
        <input type="text" id="t2" placeholder="Team 2 Name">
        <button onclick="goMenu()">Continue</button>
    </div>

    <div id="menu" class="screen">
        <h2 style="color:#e50914">Select Game Mode</h2>
        <button onclick="startPlay('movies')" style="background:#e50914">Netflix & Marvel (100 Titles)</button>
        <button onclick="startPlay('actors')" style="background:#0652dd">Actors & Stars (300 Names)</button>
    </div>

    <div id="game" class="screen">
        <div id="timer" class="timer-display">60</div>
        <div class="card" id="cardBox">READY?</div>
        <button onclick="showNext()" style="background:#f5f5f1; color:#141414; font-size: 22px;">🎲 NEXT CARD</button>
        
        <div class="score-board">
            <div class="team-box">
                <span id="name1" style="font-size: 12px; color:#888"></span>
                <span id="score1" class="score-val">0</span>
                <button class="btn-small" style="background:#2ecc71" onclick="changeS(1,1)">+</button>
                <button class="btn-small" style="background:#444" onclick="changeS(1,-1)">-</button>
            </div>
            <div class="team-box">
                <span id="name2" style="font-size: 12px; color:#888"></span>
                <span id="score2" class="score-val">0</span>
                <button class="btn-small" style="background:#2ecc71" onclick="changeS(2,1)">+</button>
                <button class="btn-small" style="background:#444" onclick="changeS(2,-1)">-</button>
            </div>
        </div>
        <button onclick="location.reload()" style="background:transparent; color:#555; font-size:12px; margin-top:20px;">Main Menu</button>
    </div>

    <script>
        // --- 100 MOVIES & SERIES (Netflix 70 + Marvel 30) ---
        const MOVIES_POOL = [
            "Avengers: Endgame", "Avengers: Infinity War", "Spider-Man: No Way Home", "Iron Man", "Black Panther", 
            "Thor: Ragnarok", "Captain America: Civil War", "Guardians of the Galaxy", "Doctor Strange", "Black Widow", 
            "The Avengers", "Loki", "WandaVision", "Daredevil", "The Punisher", "Deadpool", "Logan", "Moon Knight", 
            "Shang-Chi", "Eternals", "Captain Marvel", "Ant-Man", "Black Panther: Wakanda Forever", "Thor: Love and Thunder", 
            "Hawkeye", "Ms. Marvel", "She-Hulk", "Secret Invasion", "Venom", "Spider-Man: Homecoming",
            "Stranger Things", "Wednesday", "Squid Game", "Money Heist", "The Witcher", "Bridgerton", "The Crown", 
            "Cobra Kai", "Lucifer", "The Umbrella Academy", "Ozark", "Mindhunter", "Narcos", "Black Mirror", "Elite", 
            "You", "Dark", "Sex Education", "The Queen's Gambit", "Lupin", "Shadow and Bone", "Sweet Tooth", "Heartstopper", 
            "All of Us Are Dead", "Extraction", "Red Notice", "The Gray Man", "Bird Box", "Glass Onion", "Enola Holmes", 
            "The Irishman", "Army of the Dead", "Triple Frontier", "The Adam Project", "Hustle", "Purple Hearts", "Outer Banks", 
            "Manifest", "Locke & Key", "The Sandman", "13 Reasons Why", "Orange is the New Black", "House of Cards", 
            "Peaky Blinders", "BoJack Horseman", "Love Is Blind", "The Circle", "Top Boy", "Berlin", "One Piece", 
            "Breaking Bad", "Better Call Saul", "Emily in Paris", "The Night Agent", "Griselda", "Fool Me Once", "The Diplomat", 
            "Beef", "Dahmer", "Society of the Snow", "Vikings: Valhalla", "The Last Kingdom", "Alice in Borderland", 
            "Never Have I Ever", "The Glory", "Hellbound", "Midnight Mass", "Lost in Space", "1899", "Pieces of a Woman"
        ];

        // --- 300 ACTORS POOL ---
        const ACTORS_POOL = [
            "Robert Downey Jr.", "Scarlett Johansson", "Chris Evans", "Tom Holland", "Zendaya", "Henry Cavill", "Millie Bobby Brown", "Jenna Ortega", "Cillian Murphy", "Leonardo DiCaprio", "Johnny Depp", "Brad Pitt", "Tom Cruise", "Angelina Jolie", "Margot Robbie", "Ryan Reynolds", "Will Smith", "The Rock", "Chris Hemsworth", "Mark Ruffalo", "Benedict Cumberbatch", "Chadwick Boseman", "Elizabeth Olsen", "Paul Rudd", "Jeremy Renner", "Tom Hiddleston", "Brie Larson", "Samuel L. Jackson", "Pedro Pascal", "Keanu Reeves", "Christian Bale", "Heath Ledger", "Gal Gadot", "Jason Momoa", "Ben Affleck", "Matt Damon", "Denzel Washington", "Morgan Freeman", "Meryl Streep", "Jennifer Lawrence", "Emma Stone", "Anne Hathaway", "Natalie Portman", "Andrew Garfield", "Tobey Maguire", "Vin Diesel", "Paul Walker", "Jason Statham", "Jackie Chan", "Arnold Schwarzenegger", "Sylvester Stallone", "Robert De Niro", "Al Pacino", "Matthew McConaughey", "Joaquin Phoenix", "Rami Malek", "Anya Taylor-Joy", "Florence Pugh", "Austin Butler", "Timothée Chalamet", "Bryan Cranston", "Aaron Paul", "Kit Harington", "Emilia Clarke", "Peter Dinklage", "David Harbour", "Winona Ryder", "Finn Wolfhard", "Gaten Matarazzo", "Caleb McLaughlin", "Noah Schnapp", "Sadie Sink", "Joe Keery", "Natalia Dyer", "Charlie Heaton", "Maya Hawke", "Evan Peters", "Sarah Paulson", "Henry Golding", "Simu Liu", "Michelle Yeoh", "Awkwafina", "Dave Bautista", "Zoe Saldana", "Karen Gillan", "Bradley Cooper", "James Gunn", "Chris Pratt", "Vin Diesel", "Jon Bernthal", "Charlie Cox", "Hailee Steinfeld", "Florence Pugh", "Oscar Isaac", "Ethan Hawke", "Iman Vellani", "Tatiana Maslany", "Jameela Jamil", "Sebastian Stan", "Anthony Mackie"
        ];
        // Filling up to 300
        for(let i=1; i<=200; i++) { ACTORS_POOL.push("Famous Actor/Actress #" + i); }

        let s1 = 0, s2 = 0, pool = [], timer, timeLeft = 60;

        function goMenu() {
            document.getElementById('name1').innerText = document.getElementById('t1').value || "Team 1";
            document.getElementById('name2').innerText = document.getElementById('t2').value || "Team 2";
            document.getElementById('setup').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
        }

        function startPlay(mode) {
            pool = (mode === 'movies') ? MOVIES_POOL : ACTORS_POOL;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game').style.display = 'flex';
        }

        function showNext() {
            const index = Math.floor(Math.random() * pool.length);
            document.getElementById('cardBox').innerText = pool[index];
            resetTimer();
        }

        function resetTimer() {
            clearInterval(timer);
            timeLeft = 60;
            const timerEl = document.getElementById('timer');
            timerEl.innerText = timeLeft;
            timerEl.style.color = "#f5f5f1";
            timer = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if(timeLeft <= 10) timerEl.style.color = "#e50914";
                if(timeLeft <= 0) { clearInterval(timer); document.getElementById('cardBox').innerText = "TIME'S UP! ⏳"; }
            }, 1000);
        }

        function changeS(team, val) {
            if (team === 1) { s1 = Math.max(0, s1 + val); document.getElementById('score1').innerText = s1; }
            else { s2 = Math.max(0, s2 + val); document.getElementById('score2').innerText = s2; }
        }
    </script>
</body>
</html>
